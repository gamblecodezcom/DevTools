# =============================================================================
# gamblecodez.com/claude — nginx reverse proxy to runewager-endpoint (3001)
#
# Add this location block inside your existing gamblecodez.com server{} block
# that already has SSL configured (certbot / Let's Encrypt).
#
# File location suggestion: /etc/nginx/sites-available/gamblecodez.com
# Then: sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Drop this block inside your existing SSL server{} for gamblecodez.com ────

    location /claude {
        # Strip /claude prefix before forwarding to backend
        rewrite ^/claude(/.*)$ $1 break;
        rewrite ^/claude$       /  break;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — claude CLI can take up to 60s to respond
        proxy_read_timeout    90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;

        # CORS — Web Lab origins
        set $cors_origin "";
        if ($http_origin ~* "^https://(bot\.gamblecodez\.com|gamblecodez\.com)$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://127\.0\.0\.1(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }
        add_header 'Access-Control-Allow-Origin'  $cors_origin                  always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS'           always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, x-bridge-token' always;

        # Preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, x-bridge-token';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Security — hide internal headers
        proxy_hide_header X-Powered-By;
    }

